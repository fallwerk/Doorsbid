<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doorsbid – Thrill with the Bid</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0A0806;--dark:#110D09;--wood:#3D1F0D;
  --amber:#C8821A;--gold:#E8B84B;--cream:#F5EDD8;
  --mist:#B8A898;--red:#C0392B;--green:#27AE60;
}
html,body{height:100%;overflow:hidden;background:var(--black);color:var(--cream);font-family:'Crimson Pro',Georgia,serif}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:linear-gradient(to bottom,rgba(10,8,6,.98),transparent)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--cream);text-decoration:none}
.logo span{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.nav-stat{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mist)}
.nav-stat b{color:var(--gold);font-weight:400}
.nav-home{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mist);text-decoration:none;transition:color .2s}
.nav-home:hover{color:var(--gold)}

/* MAIN STAGE */
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;perspective:1200px}

/* DOOR CONTAINER */
.door-container{position:relative;width:min(420px,90vw);height:min(580px,80vh)}

/* DOOR FRAME */
.door-frame{
  position:absolute;inset:0;
  border:14px solid #1A0C05;
  border-radius:6px 6px 0 0;
  background:#0D0603;
  box-shadow:0 0 0 2px rgba(200,130,26,.15), inset 0 0 60px rgba(0,0,0,.9);
}

/* CONTENT BEHIND DOOR */
.door-content{
  position:absolute;inset:14px;
  overflow:hidden;
  border-radius:2px 2px 0 0;
  background:#0D0603;
}
.content-img{
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity .8s ease .4s;
  filter:brightness(0.85);
}
.content-img.show{opacity:1}
.content-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,8,6,.95) 0%,rgba(10,8,6,.3) 50%,transparent 100%);
}
.content-info{
  position:absolute;bottom:0;left:0;right:0;
  padding:2rem 1.5rem 1.5rem;
  opacity:0;transform:translateY(20px);
  transition:opacity .6s ease .8s, transform .6s ease .8s;
}
.content-info.show{opacity:1;transform:translateY(0)}
.content-location{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.content-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--cream);margin-bottom:8px;line-height:1}
.content-desc{font-size:14px;color:var(--mist);font-weight:300;font-style:italic;line-height:1.5;margin-bottom:14px}

/* BID AREA */
.bid-area{display:flex;align-items:center;justify-content:space-between;gap:12px}
.bid-current{flex:1}
.bid-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mist)}
.bid-amount{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:var(--gold);line-height:1}
.bid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);margin-top:2px}
.bid-btn{
  padding:12px 24px;background:var(--gold);color:var(--black);
  border:none;font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:2px;cursor:pointer;
  border-radius:2px;transition:all .2s;white-space:nowrap;
}
.bid-btn:hover{background:var(--amber);transform:scale(1.03)}
.bid-btn:disabled{background:rgba(232,184,75,.2);color:rgba(232,184,75,.4);cursor:not-allowed;transform:none}
.bid-btn.success{background:var(--green);color:white}

/* THE DOOR LEAF */
.door-leaf{
  position:absolute;inset:14px;
  background:linear-gradient(160deg,#6B3A1F 0%,#3D1F0D 35%,#2A1408 70%,#1A0C05 100%);
  border-radius:2px 2px 0 0;
  transform-origin:left center;
  transform:perspective(1200px) rotateY(0deg);
  transition:transform 2.2s cubic-bezier(0.25,0.46,0.45,0.94);
  box-shadow:inset -8px 0 20px rgba(0,0,0,.5), 4px 0 30px rgba(0,0,0,.6);
  will-change:transform;
}
.door-leaf.open{transform:perspective(1200px) rotateY(-105deg)}

.door-top-panel{position:absolute;top:20px;left:20px;right:20px;bottom:52%;border:1.5px solid rgba(255,255,255,.06);border-radius:2px}
.door-bot-panel{position:absolute;top:50%;left:20px;right:20px;bottom:20px;border:1.5px solid rgba(255,255,255,.06);border-radius:2px}
.door-plate{
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  background:var(--amber);padding:4px 16px;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;color:var(--black);
}
.door-knob{
  position:absolute;right:24px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;background:var(--gold);border-radius:50%;
  box-shadow:0 0 0 4px rgba(232,184,75,.2);
}
.door-texture{
  position:absolute;inset:0;opacity:.04;
  background:repeating-linear-gradient(45deg,#fff,#fff 1px,transparent 1px,transparent 8px);
  border-radius:2px 2px 0 0;
}

/* TIMER */
.timer-wrap{
  position:absolute;top:-56px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:12px;
  background:rgba(10,8,6,.9);border:1px solid rgba(232,184,75,.2);
  padding:8px 20px;border-radius:30px;
  opacity:0;transition:opacity .3s;white-space:nowrap;
}
.timer-wrap.show{opacity:1}
.timer-bar-wrap{width:120px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.timer-bar{height:100%;background:var(--gold);width:100%;transition:width 1s linear;border-radius:2px}
.timer-bar.urgent{background:var(--red)}
.timer-num{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--cream);min-width:40px;text-align:center;transition:font-size .3s ease,color .3s ease}
.timer-num.urgent{font-size:32px;color:var(--red)}

/* BIG COUNTDOWN OVERLAY */
.big-countdown{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:500;opacity:0;
  transition:opacity .2s;
}
.big-countdown.show{opacity:1}
.big-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:280px;
  color:var(--red);
  line-height:1;
  opacity:0.12;
  animation:bigPulse .9s ease-in-out infinite;
  text-shadow:0 0 80px rgba(192,57,43,.3);
  letter-spacing:-10px;
}
@keyframes bigPulse{
  0%{transform:scale(0.92);opacity:0.08}
  50%{transform:scale(1.05);opacity:0.18}
  100%{transform:scale(0.92);opacity:0.08}
}
.timer-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mist)}

/* DOOR CLOSED STATE */
.door-closed-ui{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  pointer-events:none;
}
.door-closed-ui.hidden{opacity:0;transition:opacity .3s}
.tap-hint{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:rgba(184,168,152,.5);
  display:flex;align-items:center;gap:8px;
  animation:hintPulse 2s infinite;
}
@keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}
.tap-arrow{animation:arrowBounce 1.6s infinite}
@keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* SKIP BTN */
.skip-btn{
  position:absolute;bottom:-56px;right:0;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--mist);background:transparent;
  border:none;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:color .2s;padding:8px 0;
}
.skip-btn:hover{color:var(--gold)}
.skip-btn .arrow{transition:transform .2s}
.skip-btn:hover .arrow{transform:translateX(4px)}

/* PROGRESS DOTS */
.progress-dots{
  position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;
}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(245,237,216,.2);transition:all .3s}
.dot.active{background:var(--gold);width:20px;border-radius:3px}
.dot.seen{background:rgba(245,237,216,.4)}

/* TOAST */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1A1208;border:1px solid rgba(232,184,75,.3);
  color:var(--cream);padding:10px 20px;border-radius:20px;
  font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;
  transition:transform .3s ease;white-space:nowrap;z-index:300;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* BID SUCCESS FLASH */
.bid-flash{
  position:fixed;inset:0;background:rgba(39,174,96,.08);
  pointer-events:none;opacity:0;z-index:250;
  transition:opacity .1s;
}
.bid-flash.show{opacity:1}

/* DOOR SHADOW */
.door-shadow{
  position:absolute;bottom:-12px;left:10%;right:10%;height:20px;
  background:radial-gradient(ellipse,rgba(200,130,26,.15),transparent 70%);
  filter:blur(8px);
}

/* MOBILE */
@media(max-width:480px){
  nav{padding:.8rem 1.2rem}
  .nav-stat{display:none}
  .bid-btn{padding:10px 16px;font-size:16px}
}
</style>
</head>

<nav>

    <div class="progress-dots" id="progressDots"></div>

  </div>
</div>

<div class="toast" id="toast"></div>
<div class="bid-flash" id="bidFlash"></div>
<div class="big-countdown" id="bigCountdown">

</div>

let currentIdx = 0;
let doorOpen = false;
let timerInterval = null;
let seconds = 30;
let hasBid = false;
let currentBid = 0;
let bidCount = 0;

function init() {
  buildDots();
  loadAuction(0);
  document.getElementById('doorContainer').addEventListener('click', handleDoorClick);
}

function buildDots() {
  const wrap = document.getElementById('progressDots');
  wrap.innerHTML = '';
  demoAuctions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    wrap.appendChild(d);
  });
}

function updateDots() {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot';
    if (i < currentIdx) d.classList.add('seen');
    if (i === currentIdx) d.classList.add('active');
  });
}

function loadAuction(idx) {
  const a = demoAuctions[idx];
  currentBid = a.current_price;
  bidCount = a.bid_count;
  hasBid = false;

  document.getElementById('doorPlate').textContent = a.door_number;
  document.getElementById('contentTitle').textContent = a.title;
  document.getElementById('contentLocation').textContent = a.location;
  document.getElementById('contentDesc').textContent = a.description;
  document.getElementById('bidAmount').textContent = 'CHF ' + currentBid;
  document.getElementById('bidCount').textContent = bidCount + ' Gebote · ' + a.bidder_count + ' Bieter';

  const img = document.getElementById('contentImg');
  img.src = a.img;
  img.classList.remove('show');
  document.getElementById('contentInfo').classList.remove('show');

  resetDoor();
  updateDots();
  document.getElementById('navActive').textContent = demoAuctions.length - currentIdx;
}

function resetDoor() {
  clearInterval(timerInterval);
  doorOpen = false;
  document.getElementById('doorLeaf').classList.remove('open');
  document.getElementById('timerWrap').classList.remove('show');
  document.getElementById('closedUI').classList.remove('hidden');
  document.getElementById('bidBtn').disabled = true;
  document.getElementById('bidBtn').textContent = 'BIETEN';
  document.getElementById('bidBtn').classList.remove('success');
  document.getElementById('timerBar').style.width = '100%';
  document.getElementById('timerBar').classList.remove('urgent');
  document.getElementById('timerNum').textContent = '30';
}

function handleDoorClick() {
  if (doorOpen) return;
  openDoor();
}

function openDoor() {
  doorOpen = true;
  document.getElementById('closedUI').classList.add('hidden');
  document.getElementById('doorLeaf').classList.add('open');

  setTimeout(() => {
    document.getElementById('contentImg').classList.add('show');
    document.getElementById('contentInfo').classList.add('show');
    document.getElementById('bidBtn').disabled = false;
    document.getElementById('timerWrap').classList.add('show');
    startTimer();
  }, 600);

  showToast('Tür offen! 30 Sekunden – jetzt oder nie.');
}

function startTimer() {
  seconds = 30;
  const bar = document.getElementById('timerBar');
  const num = document.getElementById('timerNum');
  const bigCountdown = document.getElementById('bigCountdown');
  const bigNum = document.getElementById('bigNum');

  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.classList.remove('urgent');
  num.classList.remove('urgent');
  bigCountdown.classList.remove('show');

  setTimeout(() => {
    bar.style.transition = 'width 1s linear';
  }, 50);

  timerInterval = setInterval(() => {
    seconds--;
    num.textContent = seconds;
    bar.style.width = ((seconds / 30) * 100) + '%';

    if (seconds <= 10) {
      bar.classList.add('urgent');
      num.classList.add('urgent');
      // Show big countdown overlay
      bigNum.textContent = seconds;
      bigCountdown.classList.add('show');
    }

    if (seconds <= 0) {
      clearInterval(timerInterval);
      bigCountdown.classList.remove('show');
      closeDoor();
    }
  }, 1000);
}

function closeDoor() {
  clearInterval(timerInterval);
  document.getElementById('doorLeaf').classList.add('open');
  document.getElementById('timerWrap').classList.remove('show');
  document.getElementById('bidBtn').disabled = true;

  showToast('Tür geschlossen. Nächste Auktion?');

  setTimeout(() => {
    document.getElementById('contentImg').classList.remove('show');
    document.getElementById('contentInfo').classList.remove('show');
    document.getElementById('doorLeaf').classList.remove('open');
    doorOpen = false;
    document.getElementById('closedUI').classList.remove('hidden');
  }, 1200);
}

function placeBid() {
  if (!doorOpen || hasBid) return;
  const newBid = currentBid + 20;
  currentBid = newBid;
  bidCount++;
  hasBid = true;

  document.getElementById('bidAmount').textContent = 'CHF ' + currentBid;
  document.getElementById('bidCount').textContent = bidCount + ' Gebote';
  document.getElementById('bidBtn').textContent = '✓ GEBOTEN';
  document.getElementById('bidBtn').classList.add('success');
  document.getElementById('bidBtn').disabled = true;

  const flash = document.getElementById('bidFlash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 300);

  document.getElementById('navBids').textContent =
    parseInt(document.getElementById('navBids').textContent) + 1;

  showToast('Gebot platziert: CHF ' + currentBid + ' ✓');
}

function nextAuction() {
  clearInterval(timerInterval);
  currentIdx = (currentIdx + 1) % demoAuctions.length;
  document.getElementById('contentImg').classList.remove('show');
  document.getElementById('contentInfo').classList.remove('show');

  setTimeout(() => loadAuction(currentIdx), 300);
  showToast('Nächste Tür...');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Keyboard: Leertaste = Tür öffnen, Pfeiltaste = nächste
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (!doorOpen) openDoor(); }
  if (e.code === 'ArrowRight') nextAuction();
  if (e.code === 'Enter' && doorOpen) placeBid();
});

init();
</script>
